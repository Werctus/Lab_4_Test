name: CI Generate & Run NUnit Tests

on:
  push:
    branches: [ "main", "ai-version-1", "ai-version-2", "ai-version-3" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-generation-and-execution:
    runs-on: ubuntu-latest
    steps:
    # 1. Получение кода
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Настройка среды Python для генератора
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install pyyaml

    # 3. Генерация тестов из спецификации
    - name: Generate NUnit tests
      run: python generator/gen_tests.py --config config.yaml

    # 4. Настройка .NET SDK
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # 5. Восстановление пакетов и сборка
    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    # 6. Запуск тестов (включая сгенерированные) с сохранением отчета
    - name: Run Tests
      run: dotnet test tests/Module.Tests/Module.Tests.csproj --no-build --logger "trx;LogFileName=test-results.trx" --verbosity normal

    # 7. Сохранение результатов в артефакты GitHub
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nunit-test-results-${{ github.ref_name }}
        path: tests/**/TestResults/test-results.trx